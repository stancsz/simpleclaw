name: Smart Code Review

on:
  pull_request:
    branches: [ development ]
    types: [ opened, synchronize, reopened ]
  schedule:
    - cron: "0 * * * *" # Runs every hour at minute 0
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: development

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: |
          if [ -f package.json ]; then bun install --frozen-lockfile || npm ci || npm install; fi

      - name: Run Tests
        continue-on-error: true
        run: |
          if [ -f package.json ]; then
            bun test > test_results.log 2>&1 || true
          else
            echo "No package.json found, skipping tests." > test_results.log
          fi

      - name: Run Code Review
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          MODEL: "deepseek-reasoner"
        run: npx tsx .github/scripts/reviewer.ts
