version: "3.8"
services:
  management-server:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - ROLE=server
      - NEXT_PUBLIC_SUPABASE_URL=http://localhost:8000
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=test_anon_key

  bot-worker:
    build: .
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - ROLE=worker
      - MANAGEMENT_API_URL=http://management-server:3000
      - MANAGEMENT_API_KEY=test-management-api-key
    depends_on:
      - management-server